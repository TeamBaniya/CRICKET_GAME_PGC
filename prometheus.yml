global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: 'cricket_bot'
    static_configs:
      - targets: ['bot:8080']
    metrics_path: '/metrics'
  
  - job_name: 'mongodb'
    static_configs:
      - targets: ['mongodb:27017']
  
  - job_name: 'redis'
    static_configs:
      - targets: ['redis:6379']
